name: Release

on:
  push:
    tags:
      # so a vX.Y.Z-test1 doesn't trigger build - no ancho working yet first one doesn't match -test1 (!)
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-pre[0-9]*'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v3
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # pin@v1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # pin@v1
      - name: Set up Go
        uses: actions/setup-go@v6 # pin@v3
        with:
          go-version: '1.25'
          check-latest: true
      - name: Log in to Docker
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # pin@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}
      - name: "GoReleaser Action"
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # pin@v7.2.3
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          TAP_DESCRIPTION: "Go Repl Open Language: simple, small but powerful interpreted language in Go"
